name: CI Quality Gate

# Fires on every push to master. Also supports manual trigger.
on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "manual"

# Needs write permission to commit the JSON log back to the repo.
permissions:
  contents: write

jobs:
  ci-gate:
    name: "test / clippy / audit"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. SSH key ─────────────────────────────────────────────────────────
      # Requires secret: VPS_SSH_KEY (private key for root@165.232.160.43)
      # Add at: Settings → Secrets and variables → Actions → New repository secret
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Write key — echo preserves actual newlines from the secret value.
          # Also strip any Windows-style \r that GitHub occasionally inserts.
          echo "${{ secrets.VPS_SSH_KEY }}" | tr -d '\r' > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          # Sanity-check: key file must be non-empty
          [ -s ~/.ssh/vps_key ] && echo "Key file written OK ($(wc -c < ~/.ssh/vps_key) bytes)" || { echo "ERROR: key file is empty"; exit 1; }
          ssh-keyscan -H 165.232.160.43 >> ~/.ssh/known_hosts 2>/dev/null
          echo "SSH configured"

      # ── 3. Copy CI script to VPS and run it ───────────────────────────────
      # vps_ci_gate.sh runs cargo test / clippy / audit independently and
      # emits delimited output that parse_ci.py turns into JSON.
      # Separating the script from the YAML avoids nested heredoc issues.
      - name: Upload CI script to VPS
        run: |
          scp -i ~/.ssh/vps_key \
              -o StrictHostKeyChecking=no \
              .github/scripts/vps_ci_gate.sh \
              root@165.232.160.43:/tmp/vps_ci_gate.sh
          ssh -i ~/.ssh/vps_key \
              -o StrictHostKeyChecking=no \
              root@165.232.160.43 "chmod +x /tmp/vps_ci_gate.sh"

      - name: Run CI gate on VPS
        id: ci_run
        run: |
          set +e
          ssh -i ~/.ssh/vps_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 \
              -o ServerAliveInterval=30 \
              root@165.232.160.43 "bash /tmp/vps_ci_gate.sh" > /tmp/ci_raw.txt 2>&1
          SSH_EXIT=$?
          echo "ssh_exit=${SSH_EXIT}" >> "$GITHUB_OUTPUT"
          echo "--- Raw VPS output ---"
          cat /tmp/ci_raw.txt

      # ── 4. Parse raw output → JSON ─────────────────────────────────────────
      - name: Parse CI output to JSON
        id: parse
        run: |
          python3 .github/scripts/parse_ci.py /tmp/ci_raw.txt /tmp/ci_result.json
          PARSE_EXIT=$?

          OVERALL=$(python3 -c "
          import json, sys
          try:
              d = json.load(open('/tmp/ci_result.json'))
              print(d['meta']['overall_status'])
          except Exception as e:
              print('ERROR')
          ")
          echo "overall=${OVERALL}" >> "$GITHUB_OUTPUT"
          echo "CI gate overall: ${OVERALL}"
          echo "--- JSON result ---"
          cat /tmp/ci_result.json

      # ── 5. Commit JSON log to repo ─────────────────────────────────────────
      - name: Commit JSON log
        if: always()
        run: |
          OVERALL="${{ steps.parse.outputs.overall }}"
          TIMESTAMP=$(date -u '+%Y-%m-%d_%H%M%S')
          VPS_COMMIT=$(python3 -c "
          import json
          try:
              d = json.load(open('/tmp/ci_result.json'))
              print(d['meta']['commit'])
          except:
              print('unknown')
          ")

          LOG_FILE="logs/ci/${TIMESTAMP}_${VPS_COMMIT}_${OVERALL}.json"
          cp /tmp/ci_result.json "${LOG_FILE}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/ci/

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            EMOJI=$([ "$OVERALL" = "PASSED" ] && echo "✅" || [ "$OVERALL" = "ERROR" ] && echo "⚠️" || echo "❌")
            git commit -m "ci-log: ${TIMESTAMP} ${VPS_COMMIT} ${EMOJI} ${OVERALL}"
            git push origin master
            echo "Committed: ${LOG_FILE}"
          fi

      # ── 6. Job summary ─────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          python3 - << 'PYEOF'
          import json, os

          try:
              doc = json.load(open('/tmp/ci_result.json'))
          except Exception as e:
              with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
                  f.write(f"## CI Quality Gate — ⚠️ ERROR\n\nCould not parse result: {e}\n")
              exit(0)

          meta  = doc.get('meta', {})
          steps = doc.get('steps', {})
          svc   = doc.get('service', {})
          env   = doc.get('environment', {})

          def badge(s):
              return {'PASSED':'✅ PASSED','FAILED':'❌ FAILED','ADVISORY':'⚠️ ADVISORY','ERROR':'⚠️ ERROR'}.get(s, s)

          t = steps.get('tests', {})
          c = steps.get('clippy', {})
          a = steps.get('audit', {})

          out = f"""## CI Quality Gate — {badge(meta.get('overall_status','?'))}

          | | Check | Result | Detail |
          |---|---|---|---|
          | 🧪 | `cargo test` | {badge(t.get('status','?'))} | {t.get('total_passed',0)} passed · {t.get('total_failed',0)} failed · {t.get('duration_seconds',0)}s |
          | 🔍 | `cargo clippy` | {badge(c.get('status','?'))} | {c.get('error_count',0)} errors · {c.get('duration_seconds',0)}s |
          | 🔒 | `cargo audit` | {badge(a.get('status','?'))} | {a.get('vulnerability_count',0)} vulns · {a.get('duration_seconds',0)}s |
          | 💚 | Service | {'✅ ' if svc.get('status')=='active' else '❌ '}{svc.get('status','?')} | tradingbots |

          **Commit:** `{meta.get('commit','?')}` — {meta.get('commit_message','')[:80]}
          **Environment:** {env.get('rustc','?')}
          """

          if t.get('failures'):
              out += "\n### ❌ Failing Tests\n```\n" + "\n".join(t['failures']) + "\n```\n"
          if c.get('errors'):
              out += "\n### ❌ Clippy Errors\n```\n"
              for e in c['errors'][:10]:
                  loc = f"{e.get('file','?')}:{e.get('line','?')}" if 'file' in e else ''
                  out += f"[{e.get('code','?')}] {e.get('message','?')}  {loc}\n"
              out += "```\n"
          if a.get('vulnerabilities'):
              out += "\n### ⚠️ Vulnerabilities\n"
              for v in a['vulnerabilities'][:10]:
                  out += f"- **{v.get('id','?')}** `{v.get('crate','?')} {v.get('version','')}` — {v.get('title','?')} ({v.get('severity','?')})\n"

          out += "\n---\n*Log committed to `logs/ci/` in this repo.*"

          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
              f.write(out)
          print("Summary written")
          PYEOF

      # ── 7. Fail workflow if gate didn't pass ───────────────────────────────
      - name: Assert CI gate passed
        if: always()
        run: |
          OVERALL="${{ steps.parse.outputs.overall }}"
          case "$OVERALL" in
            PASSED)   echo "✅ All checks passed." ;;
            ADVISORY) echo "⚠️  Security advisories found — review logs/ci/"; exit 1 ;;
            *)        echo "❌ CI gate FAILED — see job summary and logs/ci/"; exit 1 ;;
          esac
