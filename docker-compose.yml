version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tradingbots-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tradingbots
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tradingbots-net

  tradingbots:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tradingbots-app
    environment:
      MODE: testnet
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/tradingbots
      RUST_LOG: info
      TRADING_SYMBOL: SOL
      INITIAL_CAPITAL: 100
      BINANCE_API_KEY: ${BINANCE_API_KEY}
      HYPERLIQUID_KEY: ${HYPERLIQUID_KEY}
      HYPERLIQUID_SECRET: ${HYPERLIQUID_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tradingbots-net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  tradingbots-net:
    driver: bridge
